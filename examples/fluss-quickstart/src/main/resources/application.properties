# ---- Fluss Connector Configuration ----

# Incoming: consume rows from the "events" log table
mp.messaging.incoming.events-in.connector=smallrye-fluss
mp.messaging.incoming.events-in.bootstrap-servers=localhost:9122
mp.messaging.incoming.events-in.database=quickstart_db
mp.messaging.incoming.events-in.table=events

# Outgoing: timed producer -> "events" log table
mp.messaging.outgoing.ticker-out.connector=smallrye-fluss
mp.messaging.outgoing.ticker-out.bootstrap-servers=localhost:9122
mp.messaging.outgoing.ticker-out.database=quickstart_db
mp.messaging.outgoing.ticker-out.table=events
mp.messaging.outgoing.ticker-out.batch-size=10

# Outgoing: REST emitter -> "events" log table
mp.messaging.outgoing.events-out.connector=smallrye-fluss
mp.messaging.outgoing.events-out.bootstrap-servers=localhost:9122
mp.messaging.outgoing.events-out.database=quickstart_db
mp.messaging.outgoing.events-out.table=events
mp.messaging.outgoing.events-out.batch-size=1
